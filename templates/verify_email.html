{% extends "base.html" %}
{% block title %}Email Verification - LGU3{% endblock %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">

        <div class="card shadow-lg border-0 p-4 text-center">

            <div class="mb-4">
                <i class="bi bi-envelope-check-fill text-primary" style="font-size: 3rem;"></i>
                <h3 class="mt-3 fw-bold">Email Verification</h3>
                <p class="text-muted">
                    Enter the 6-digit code sent to your email address.
                </p>
            </div>

            <form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="mb-4">
        <input type="text"
               name="otp"
               maxlength="6"
               pattern="\d{6}"
               class="form-control form-control-lg text-center otp-input"
               placeholder="••••••"
               required
               autofocus>
    </div>

    <button type="submit" class="btn btn-primary w-100 btn-lg">
        Verify Account
    </button>
</form>

            <div class="mt-4">
                <small class="text-muted">
                    Didn't receive the code?
                </small>
                <br>
                <a href="{{ url_for('resend_email_otp') }}" class="fw-semibold text-primary">
                    Resend Code
                </a>
            </div>

        </div>

    </div>
</div>

{% endblock %}
