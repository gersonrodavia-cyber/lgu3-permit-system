{% extends "base.html" %}
{% block title %}2FA Verification{% endblock %}

{% block content %}
<div class="container py-5" style="max-width:520px;">
  <div class="card bg-dark text-light shadow">
    <div class="card-body p-4">
      <h4 class="fw-bold mb-2">Two-Factor Verification</h4>
      <p class="text-muted mb-4">Enter the 6-digit code from your Authenticator app.</p>

      <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="mb-3">
          <label class="form-label">Authenticator Code</label>
          <input name="code" class="form-control" placeholder="123456" maxlength="6" required>
        </div>
        <button class="btn btn-primary w-100">Verify & Login</button>
      </form>

      <div class="text-center mt-3">
        <a class="text-decoration-none" href="{{ url_for('login') }}">Back to login</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
